<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en-IN" }}">
{%- include "head.html" -%}
<body class="{% if page.style %}{{ page.style }} {% endif %}">
  {%- include "header.html" -%}

  <main>
    <div class="container readable">
      <article class="page-content article-content"> 
        {{ content }}

        {%- include "links.html" -%}
      </article>
      <section class="page-content mt-1">
        <button type="button" onclick="window.history.back();">Back</button>
      </section>
    </div>
  </main>

  {%- include "footer.html" -%}
</body>
</html>
